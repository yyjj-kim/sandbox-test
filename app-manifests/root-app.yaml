apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/yyjj-kim/sandbox-test.git'
    targetRevision: HEAD
    path: apps              # 이 경로 안의 모든 yaml을 배포합니다.
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd       # App manifest 자체는 argocd 네임스페이스에 생성합니다.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
